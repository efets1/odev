- name: Docker container deploy
  hosts: web
  become: yes

  tasks:

    - name: Docker ve Docker Compose kur
      apt:
        name: 
          - docker.io
          - docker-compose
        state: present
        update_cache: yes

    - name: Docker başlat
      service:
        name: docker
        state: started
        enabled: yes

    - name: Hedef klasörü oluştur
      file:
        path: /opt/mhrs
        state: directory

    - name: Proje dosyalarını sunucuya kopyala
      copy:
        src: "{{ playbook_dir }}/../"
        dest: /opt/mhrs/

    - name: Docker Compose ile uygulamayı ayağa kaldır
      shell: docker-compose up -d --build
      args:
        chdir: /opt/mhrs
